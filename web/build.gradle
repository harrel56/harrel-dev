configurations {
    output
}

tasks.register('clean') {
    delete files('dist')
}

tasks.register('bunInstall', Exec) {
    commandLine 'bun', 'install', '--frozen-lockfile'
}

tasks.register('build', Exec) {
    dependsOn(bunInstall)
    commandLine 'bun', 'run', '--bun', 'build'
    inputs.files(fileTree('.').matching {
        exclude 'dist', 'node_modules', 'bun.lockb'
    }.findAll())
    outputs.dir('dist')

    // create index file
    doLast {
        def fileNames = []
        def distPath = file('dist').toPath()
        fileTree('dist').each {
            fileNames.add distPath.relativize(it.toPath())
        }
        print fileNames
        def indexFile = distPath.resolve('files.index').toFile()
        indexFile.text = fileNames.join(System.lineSeparator())
    }
}

artifacts {
    output(tasks.build.outputs.files.singleFile) {
        builtBy('build')
    }
}